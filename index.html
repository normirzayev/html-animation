<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <style>

    section{
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      animation: animationBG 5s infinite linear;
    }
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    .box{
      position: relative;
      width: 150px;
      height: 150px;
    }
    span{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: rotate(calc(18deg * var(--i)));
    }
    span::before{
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 15px;
      height: 15px;
      background-color: red;
      border-radius: 50%;
      box-shadow: 0 0 10px red,
                  0 0 20px red,
                  0 0 40px red,
                  0 0 60px red,
                  0 0 80px red,
                  0 0 100px red;

    animation: identifier 2s infinite linear;
    animation-delay:calc( 0.1s * var(--i));
    }

    @keyframes identifier {
      0% {
        transform: scale(1);
      }
      80%,100%{
        transform: scale(0);
      }
    }
    @keyframes animationBG{
      0%{
        filter: hue-rotate(0deg);
      }
      100%{
        filter: hue-rotate(360deg);
      }
    }
  </style>

  <section>
    <div class="box">
      <span style="--i:1"></span>
      <span style="--i:2"></span>
      <span style="--i:3"></span>
      <span style="--i:4"></span>
      <span style="--i:5"></span>
      <span style="--i:6"></span>
      <span style="--i:7"></span>
      <span style="--i:8"></span>
      <span style="--i:9"></span>
      <span style="--i:10"></span>
      <span style="--i:11"></span>
      <span style="--i:12"></span>
      <span style="--i:13"></span>
      <span style="--i:14"></span>
      <span style="--i:15"></span>
      <span style="--i:16"></span>
      <span style="--i:17"></span>
      <span style="--i:18"></span>
      <span style="--i:19"></span>
      <span style="--i:20"></span>
    </div>
  </section>

</body>
</html>
